networks:
  hub_almadia_network:
    external: true
  supabase_network:
    external: true
    name: supabase_network_${SUPABASE_PROJECT_ID}

services:
  app-starter-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${APP_SLUG}_backend
    container_name: ${APP_SLUG}-backend
    env_file:
      - ./.env
    environment:
      - APP_NAME=${APP_NAME}
      - APP_SLUG=${APP_SLUG}
      - APP_SCHEMA=${APP_SCHEMA}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_DEBUG=${API_DEBUG:-false}
      - API_RELOAD=${API_RELOAD:-false}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DOMAIN_FRONTEND=${DOMAIN_FRONTEND}
      - DOMAIN_API=${DOMAIN_API}
      - DOMAIN_BASE=${DOMAIN_BASE}
      - FRONTEND_BASE_PATH=${FRONTEND_BASE_PATH}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-7200}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE:-lax}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - RATE_LIMIT_DEV_MAX_REQUESTS=${RATE_LIMIT_DEV_MAX_REQUESTS:-1000}
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST:-hub_almadia_redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    networks:
      - hub_almadia_network
      - supabase_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
      - /run:rw,noexec,nosuid,nodev
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hub_almadia_network"
      - "traefik.http.middlewares.${APP_SLUG}-api-strip.stripprefix.prefixes=${FRONTEND_BASE_PATH}/api"
      - "traefik.http.middlewares.${APP_SLUG}-api-strip.stripprefix.forceslash=true"
      - "traefik.http.routers.${APP_SLUG}-backend.rule=(Host(`${DOMAIN_FRONTEND}`) || Host(`${DOMAIN_API}`)) && PathPrefix(`${FRONTEND_BASE_PATH}/api`)"
      - "traefik.http.routers.${APP_SLUG}-backend.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG}-backend.tls=true"
      - "traefik.http.routers.${APP_SLUG}-backend.priority=220"
      - "traefik.http.routers.${APP_SLUG}-backend.middlewares=hub_almadia_auth@file,security-headers@file,${APP_SLUG}-api-strip"
      - "traefik.http.services.${APP_SLUG}-backend.loadbalancer.server.port=8000"
    restart: unless-stopped

  app-starter-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_BASE_PATH: ${FRONTEND_BASE_PATH}
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_NAME: ${VITE_APP_NAME:-}
        VITE_APP_DESCRIPTION: ${VITE_APP_DESCRIPTION:-}
        VITE_THEME_COLOR: ${VITE_THEME_COLOR:-}
    image: ${APP_SLUG}_frontend
    container_name: ${APP_SLUG}-frontend
    env_file:
      - ./.env
    depends_on:
      app-starter-backend:
        condition: service_healthy
    networks:
      - hub_almadia_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hub_almadia_network"
      - "traefik.http.middlewares.${APP_SLUG}-frontend-strip.stripprefix.prefixes=${FRONTEND_BASE_PATH}"
      - "traefik.http.middlewares.${APP_SLUG}-frontend-strip.stripprefix.forceslash=true"
      - "traefik.http.routers.${APP_SLUG}.rule=(Host(`${DOMAIN_FRONTEND}`) || Host(`${DOMAIN_API}`)) && PathPrefix(`${FRONTEND_BASE_PATH}`)"
      - "traefik.http.routers.${APP_SLUG}.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG}.tls=true"
      - "traefik.http.routers.${APP_SLUG}.priority=215"
      - "traefik.http.routers.${APP_SLUG}.middlewares=hub_almadia_auth@file,security-headers@file,${APP_SLUG}-frontend-strip"
      - "traefik.http.routers.${APP_SLUG}.service=${APP_SLUG}-frontend"

      # Route publique pour les assets PWA (nécessaire pour l'installation native WebAPK)
      - "traefik.http.routers.${APP_SLUG}-pwa.rule=(Host(`${DOMAIN_FRONTEND}`) || Host(`${DOMAIN_API}`)) && PathPrefix(`${FRONTEND_BASE_PATH}`) && (PathPrefix(`${FRONTEND_BASE_PATH}/manifest.json`) || PathPrefix(`${FRONTEND_BASE_PATH}/sw.js`) || PathPrefix(`${FRONTEND_BASE_PATH}/icon-192.png`) || PathPrefix(`${FRONTEND_BASE_PATH}/icon-512.png`) || PathPrefix(`${FRONTEND_BASE_PATH}/icon.svg`) || PathPrefix(`${FRONTEND_BASE_PATH}/apple-touch-icon.png`))"
      - "traefik.http.routers.${APP_SLUG}-pwa.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG}-pwa.tls=true"
      - "traefik.http.routers.${APP_SLUG}-pwa.priority=250"
      - "traefik.http.routers.${APP_SLUG}-pwa.middlewares=security-headers@file,${APP_SLUG}-frontend-strip"
      - "traefik.http.routers.${APP_SLUG}-pwa.service=${APP_SLUG}-frontend"

      - "traefik.http.services.${APP_SLUG}-frontend.loadbalancer.server.port=80"
    restart: unless-stopped

  sma-scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    image: ${APP_SLUG}_scheduler
    container_name: ${APP_SLUG}-scheduler
    environment:
      - BACKEND_URL=http://${APP_SLUG}-backend:8000
      - SCHEDULER_KEY=${SCHEDULER_KEY:-}
    depends_on:
      app-starter-backend:
        condition: service_healthy
    networks:
      - hub_almadia_network
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
